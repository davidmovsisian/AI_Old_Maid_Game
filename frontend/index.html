<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Old Maid - Setup</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <h1>Old Maid Setup</h1>
    <form id="setup-form" class="panel">
      <label for="player-name">Your Name</label>
      <input id="player-name" name="playerName" type="text" required maxlength="40" />

      <label for="ai-count">AI Players</label>
      <select id="ai-count" name="aiCount">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>

      <label for="house-rules">House Rules</label>
      <textarea id="house-rules" name="houseRules" rows="4" placeholder="Optional custom rules"></textarea>

      <label for="api-base-url">API Base URL</label>
      <input id="api-base-url" name="apiBaseUrl" type="text" placeholder="http://127.0.0.1:8000" />

      <button id="start-button" type="submit">Start Game</button>
      <p id="setup-error" class="error" role="alert"></p>
    </form>
  </main>
  <script type="module" src="./js/setup.js"></script>
</body>
</html>
